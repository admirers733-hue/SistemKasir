<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<title>Transaksi</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#fff7ed,#ffe4c7);
margin:0;
padding:0;
}

.container{
width:70%;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#b45309;
}

label{
font-weight:bold;
display:block;
margin-top:12px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

.button{
margin-top:20px;
text-align:center;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:8px;
color:white;
font-size:15px;
cursor:pointer;
}

.simpan{
background:#16a34a;
}

.hitung{
background:#ea580c;
}

.reset{
background:#475569;
}

.kembali{
background:#2563eb;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>TRANSAKSI PENJUALAN</h1>

<label>Tanggal</label>
<input type="date" id="tanggal">

<label>Nama Kasir</label>
<input type="text" id="kasir">

<label>Nama Barang</label>
<input type="text" id="barang">

<label>Harga Barang</label>
<input type="number" id="harga">

<label>Jumlah Beli</label>
<input type="number" id="jumlah">

<label>Total Bayar</label>
<input type="number" id="total" readonly>

<div class="button">

<button class="hitung" onclick="hitungTotal()">Hitung</button>

<button class="simpan" onclick="simpan()">Simpan</button>

<button class="reset" onclick="resetForm()">Reset</button>

<a href="index.html">
<button type="button" class="kembali">Kembali</button>
</a>

</div>

</div>

<script>

function hitungTotal(){

var harga=parseInt(document.getElementById("harga").value)||0;
var jumlah=parseInt(document.getElementById("jumlah").value)||0;

document.getElementById("total").value=harga*jumlah;

}

function resetForm(){

document.getElementById("tanggal").value="";
document.getElementById("kasir").value="";
document.getElementById("barang").value="";
document.getElementById("harga").value="";
document.getElementById("jumlah").value="";
document.getElementById("total").value="";

}

function simpan(){

if(document.getElementById("barang").value==""){

alert("Silakan isi data terlebih dahulu.");

}else{

alert("Transaksi berhasil disimpan.");

}

}

</script>

</body>
</html>
