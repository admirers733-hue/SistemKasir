<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Sistem Kasir</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#312e81,#111827);

}

.login-box{

width:380px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);

}

h1{

text-align:center;
color:#312e81;
margin-bottom:10px;

}

p{

text-align:center;
color:#666;
margin-bottom:25px;

}

label{

font-weight:bold;
color:#444;

}

input{

width:100%;
padding:12px;
margin-top:6px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;

}

input:focus{

outline:none;
border:2px solid #4f46e5;

}

button{

width:100%;
padding:12px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:bold;

}

button:hover{

background:#312e81;

}

.footer{

text-align:center;
margin-top:20px;
font-size:13px;
color:gray;

}

</style>

</head>

<body>

<div class="login-box">

<h1>SISTEM KASIR</h1>

<p>Silakan Login</p>

<label>Username</label>
<input type="text" id="username" placeholder="Masukkan Username">

<label>Password</label>
<input type="password" id="password" placeholder="Masukkan Password">

<button onclick="login()">LOGIN</button>

<div class="footer">

© 2026 Sistem Kasir

</div>

</div>

<script>

function login(){

var username=document.getElementById("username").value;
var password=document.getElementById("password").value;

if(username=="RONIATI" && password=="24110043"){

alert("Login Berhasil");

window.location.href="index.html";

}else{

alert("Username atau Password Salah");

}

}

</script>

</body>
</html>
