<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Sistem Kasir</title>
</head>

<body>

    <h1 align="center">SISTEM KASIR</h1>
    <hr>

    <h2 align="center">Dashboard</h2>

    <p align="center">
        Selamat Datang, Admin
    </p>

    <table border="1" align="center" cellpadding="10">

        <tr>
            <th>No</th>
            <th>Menu</th>
            <th>Keterangan</th>
        </tr>

        <tr>
            <td align="center">1</td>
            <td>Data Barang</td>
            <td>Menambah, Mengubah, Menghapus Data Barang</td>
        </tr>

        <tr>
            <td align="center">2</td>
            <td>Pencarian Barang</td>
            <td>Mencari Data Barang</td>
        </tr>

        <tr>
            <td align="center">3</td>
            <td>Transaksi</td>
            <td>Melakukan Penjualan</td>
        </tr>

        <tr>
            <td align="center">4</td>
            <td>Laporan</td>
            <td>Melihat Laporan Penjualan</td>
        </tr>

        <tr>
            <td align="center">5</td>
            <td>Logout</td>
            <td>Keluar dari Sistem</td>
        </tr>

    </table>

    <br>

    <center>
        <button>Data Barang</button>
        <button>Pencarian</button>
        <button>Transaksi</button>
        <button>Laporan</button>
        <button>Logout</button>
    </center>

</body>
</html>
