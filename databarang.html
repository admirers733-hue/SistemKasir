<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Barang - Sistem Kasir</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#f0fdf4,#dcfce7);
}

.container{
width:90%;
margin:30px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#166534;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
font-weight:bold;
margin-bottom:5px;
color:#374151;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

input:focus{
outline:none;
border:2px solid #16a34a;
}

.button{
text-align:center;
margin-top:20px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
margin:5px;
color:white;
font-weight:bold;
cursor:pointer;
}

.simpan{
background:#16a34a;
}

.edit{
background:#f59e0b;
}

.hapus{
background:#dc2626;
}

.reset{
background:#6b7280;
}

.kembali{
background:#2563eb;
}

button:hover{
opacity:0.9;
}

.cari{
margin-top:30px;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#166534;
color:white;
padding:12px;
}

td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

tr:nth-child(even){
background:#f9fafb;
}

tr:hover{
background:#dcfce7;
cursor:pointer;
}

a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>DATA BARANG</h1>

<div class="form-group">
<label>Kode Barang</label>
<input type="text" id="kode">
</div>

<div class="form-group">
<label>Nama Barang</label>
<input type="text" id="nama">
</div>

<div class="form-group">
<label>Harga</label>
<input type="number" id="harga">
</div>

<div class="form-group">
<label>Stok</label>
<input type="number" id="stok">
</div>

<div class="button">

<button class="simpan" onclick="simpan()">Simpan</button>

<button class="edit" onclick="editData()">Edit</button>

<button class="hapus" onclick="hapusData()">Hapus</button>

<button class="reset" onclick="resetForm()">Reset</button>

<a href="index.html">
<button type="button" class="kembali">Kembali</button>
</a>

</div>

<div class="cari">

<input type="text" id="pencarian" placeholder="Cari Kode atau Nama Barang..." onkeyup="cariBarang()">

</div>

<table id="tabelBarang">

<tr>
<th>No</th>
<th>Kode</th>
<th>Nama Barang</th>
<th>Harga</th>
<th>Stok</th>
</tr>
</tr>

</table>

</div>

<script>

let nomor = 1;
let barisDipilih = null;

function simpan(){

let kode = document.getElementById("kode").value.trim();
let nama = document.getElementById("nama").value.trim();
let harga = document.getElementById("harga").value.trim();
let stok = document.getElementById("stok").value.trim();

if(kode=="" || nama=="" || harga=="" || stok==""){

alert("Semua data harus diisi.");
return;

}

let tabel = document.getElementById("tabelBarang");

let row = tabel.insertRow();

row.insertCell(0).innerHTML = nomor++;
row.insertCell(1).innerHTML = kode;
row.insertCell(2).innerHTML = nama;
row.insertCell(3).innerHTML = harga;
row.insertCell(4).innerHTML = stok;

row.onclick = function(){

barisDipilih = this;

document.getElementById("kode").value = this.cells[1].innerHTML;
document.getElementById("nama").value = this.cells[2].innerHTML;
document.getElementById("harga").value = this.cells[3].innerHTML;
document.getElementById("stok").value = this.cells[4].
