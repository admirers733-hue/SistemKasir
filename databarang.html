<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Barang - Sistem Kasir</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ecfdf5,#d1fae5);
}

.container{
width:90%;
margin:30px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#065f46;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
color:#374151;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

input:focus{
outline:none;
border:2px solid #10b981;
}

.button{
text-align:center;
margin-top:20px;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
}

.simpan{
background:#16a34a;
}

.edit{
background:#f59e0b;
}

.hapus{
background:#dc2626;
}

.reset{
background:#6b7280;
}

.kembali{
background:#2563eb;
}

button:hover{
opacity:0.9;
}

.cari{
margin-top:30px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#065f46;
color:white;
padding:12px;
}

td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

tr:nth-child(even){
background:#f9fafb;
}

tr:hover{
background:#d1fae5;
cursor:pointer;
}

a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>DATA BARANG</h1>

<div class="form-group">
<label>Kode Barang</label>
<input type="text" id="kode">
</div>

<div class="form-group">
<label>Nama Barang</label>
<input type="text" id="nama">
</div>

<div class="form-group">
<label>Harga</label>
<input type="number" id="harga">
</div>

<div class="form-group">
<label>Stok</label>
<input type="number" id="stok">
</div>

<div class="button">

<button class="simpan" onclick="simpan()">Simpan</button>

<button class="edit" onclick="editData()">Edit</button>

<button class="hapus" onclick="hapusData()">Hapus</button>

<button class="reset" onclick="resetForm()">Reset</button>

<a href="index.html">
<button type="button" class="kembali">Kembali</button>
</a>

</div>

<div class="cari">

<input type="text" id="pencarian" placeholder="Cari kode atau nama barang..." onkeyup="cariBarang()">

</div>

<table id="tabelBarang">

<tr>
<th>No</th>
<th>Kode</th>
<th>Nama Barang</th>
<th>Harga</th>
<th>Stok</th>
</tr>
<tr onclick="pilihBaris(this)">
<td>1</td>
<td>BR001</td>
<td>Indomie</td>
<td>3500</td>
<td>100</td>
</tr>

<tr onclick="pilihBaris(this)">
<td>2</td>
<td>BR002</td>
<td>Aqua 600ml</td>
<td>5000</td>
<td>80</td>
</tr>

<tr onclick="pilihBaris(this)">
<td>3</td>
<td>BR003</td>
<td>Teh Botol</td>
<td>6000</td>
<td>50</td>
</tr>

</table>

</div>

<script>

let nomor = 4;
let baris = null;

function simpan(){

let kode=document.getElementById("kode").value;
let nama=document.getElementById("nama").value;
let harga=document.getElementById("harga").value;
let stok=document.getElementById("stok").value;

if(kode==""||nama==""||harga==""||stok==""){

alert("Semua data harus diisi");
return;

}

let tabel=document.getElementById("tabelBarang");

let row=tabel.insertRow(-1);

row.setAttribute("onclick","pilihBaris(this)");

row.insertCell(0).innerHTML=nomor++;
row.insertCell(1).innerHTML=kode;
row.insertCell(2).innerHTML=nama;
row.insertCell(3).innerHTML=harga;
row.insertCell(4).innerHTML=stok;

resetForm();

alert("Data berhasil disimpan");

}

function pilihBaris(x){

baris=x;

document.getElementById("kode").value=x.cells[1].innerHTML;
document.getElementById("nama").value=x.cells[2].innerHTML;
document.getElementById("harga").value=x.cells[3].innerHTML;
document.getElementById("stok").value=x.cells[4].innerHTML;

}
function editData(){

if(baris==null){

alert("Silakan pilih data yang akan diedit.");
return;

}

baris.cells[1].innerHTML=document.getElementById("kode").value;
baris.cells[2].innerHTML=document.getElementById("nama").value;
baris.cells[3].innerHTML=document.getElementById("harga").value;
baris.cells[4].innerHTML=document.getElementById("stok").value;

alert("Data berhasil diubah.");

}

function hapusData(){

if(baris==null){

alert("Silakan pilih data yang akan dihapus.");
return;

}

baris.remove();

baris=null;

resetForm();

alert("Data berhasil dihapus.");

}

function resetForm(){

document.getElementById("kode").value="";
document.getElementById("nama").value="";
document.getElementById("harga").value="";
document.getElementById("stok").value="";

}

function cariBarang(){

let input=document.getElementById("pencarian").value.toUpperCase();

let tabel=document.getElementById("tabelBarang");

let tr=tabel.getElementsByTagName("tr");

for(let i=1;i<tr.length;i++){

let kode=tr[i].cells[1].innerHTML.toUpperCase();
let nama=tr[i].cells[2].innerHTML.toUpperCase();

if(kode.indexOf(input)>-1 || nama.indexOf(input)>-1){

tr[i].style.display="";

}else{

tr[i].style.display="none";

}

}

}

</script>

</body>
</html>
