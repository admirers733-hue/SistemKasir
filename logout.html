<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Logout</title>

<style>

body{

margin:0;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0f172a,#334155);

}

.box{

background:white;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.3);
width:380px;

}

h2{

color:#0f172a;
margin-bottom:15px;

}

p{

color:#555;
margin-bottom:25px;

}

button{

padding:12px 25px;
background:#dc2626;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;

}

button:hover{

background:#b91c1c;

}

</style>

</head>

<body>

<div class="box">

<h2>Logout Berhasil</h2>

<p>Terima kasih telah menggunakan Sistem Kasir.</p>

<button onclick="kembaliLogin()">
Login Kembali
</button>

</div>

<script>

function kembaliLogin(){

window.location.href="login.html";

}

</script>

</body>

</html>
