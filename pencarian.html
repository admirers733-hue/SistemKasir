<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pencarian Barang</title>

<style>

body{
    font-family:Arial,sans-serif;
    margin:0;
    background:linear-gradient(135deg,#faf5ff,#ede9fe);
}

.container{
    width:85%;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#6d28d9;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:20px;
    font-size:15px;
    box-sizing:border-box;
}

button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.cari{
background:#7c3aed;
}

.reset{
background:#475569;
}

.kembali{
background:#2563eb;
}

button:hover{
opacity:0.9;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#6d28d9;
    color:white;
    padding:10px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background:#faf5ff;
}

.menu{
text-align:center;
}

a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>PENCARIAN BARANG</h1>

<input type="text" id="cari" placeholder="Masukkan Kode atau Nama Barang">

<div class="menu">

<button class="cari" onclick="cariBarang()">Cari</button>

<button class="reset" onclick="resetCari()">Reset</button>

<a href="index.html">
<button type="button" class="kembali">Kembali</button>
</a>

</div>

<table id="tabelBarang">

<tr>
<th>No</th>
<th>Kode</th>
<th>Nama Barang</th>
<th>Harga</th>
<th>Stok</th>
</tr>

<tr>
<td>1</td>
<td>BR001</td>
<td>Indomie</td>
<td>3500</td>
<td>100</td>
</tr>

<tr>
<td>2</td>
<td>BR002</td>
<td>Aqua 600ml</td>
<td>5000</td>
<td>80</td>
</tr>

<tr>
<td>3</td>
<td>BR003</td>
<td>Teh Botol</td>
<td>6000</td>
<td>50</td>
</tr>

<tr>
<td>4</td>
<td>BR004</td>
<td>Kopi ABC</td>
<td>2500</td>
<td>120</td>
</tr>

<tr>
<td>5</td>
<td>BR005</td>
<td>Gula Pasir</td>
<td>16000</td>
<td>40</td>
</tr>

</table>

</div>

<script>

function cariBarang(){

var input=document.getElementById("cari").value.toUpperCase();

var tabel=document.getElementById("tabelBarang");

var tr=tabel.getElementsByTagName("tr");

for(var i=1;i<tr.length;i++){

var kode=tr[i].getElementsByTagName("td")[1];
var nama=tr[i].getElementsByTagName("td")[2];

if(kode && nama){

var teksKode=kode.innerHTML.toUpperCase();
var teksNama=nama.innerHTML.toUpperCase();

if(teksKode.indexOf(input)>-1 || teksNama.indexOf(input)>-1){

tr[i].style.display="";

}else{

tr[i].style.display="none";

}

}

}

}

function resetCari(){

document.getElementById("cari").value="";

var tr=document.getElementById("tabelBarang").getElementsByTagName("tr");

for(var i=1;i<tr.length;i++){

tr[i].style.display="";

}

}

</script>

</body>
</html>
